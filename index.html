<!DOCTYPE html>
<html>
<head>
  <title>Toko Online</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR FIXED -->
<nav class="navbar">
  <a href="#">Home</a>
  <a href="#products">Produk</a>
  <a href="#keranjang">Keranjang</a>
  <a href="about-contact.html">About</a>
</nav>

<!-- HERO / WELCOME SCREEN -->
<section class="hero">
  <div class="hero-content">
    <h1>Selamat Datang di Toko Kami</h1>
    <p>Temukan produk terbaik dengan harga terbaik</p>
    <a href="#products" class="btn">Lihat Produk</a>
  </div>
</section>

<!-- PRODUK SECTION -->
<section id="products" class="products-section">
  <h2>Produk Kami</h2>
  <div class="products" id="product-list"></div>
</section>

<!-- CART -->
<section class="cart-section" id="keranjang">
  <h2>Keranjang</h2>
  <div id="cart-list"></div>
  <h3>Total: Rp <span id="total">0</span></h3>
<section class="checkout-section">
  <h2>Checkout</h2>

  <input id="nama" placeholder="Nama"><br><br>
  <input id="alamat" placeholder="Alamat"><br><br>

<h3>Pilih Pengiriman</h3>

<div class="shipping-options">
  <label>
    <input type="radio" name="shipping" value="jne" checked>
    JNE
  </label>

  <label>
    <input type="radio" name="shipping" value="jnt">
    J&T
  </label>

  <label>
    <input type="radio" name="shipping" value="sicepat">
    SiCepat
  </label>
</div>
  <h3>Pilih Pembayaran</h3>

  <div class="payment-options">
    <label>
      <input type="radio" name="payment" value="transfer" checked>
      Transfer Bank
    </label>

    <label>
      <input type="radio" name="payment" value="dana">
      DANA
    </label>

    <label>
      <input type="radio" name="payment" value="ovo">
      OVO
    </label>

    <label>
      <input type="radio" name="payment" value="gopay">
      GoPay
    </label>

    <label>
      <input type="radio" name="payment" value="cod">
      COD (Bayar di Tempat)
    </label>
  </div>

  <br>
  <button onclick="checkout()">Bayar Sekarang</button>

  <h3 id="status" class="hidden">✅ Pembayaran Berhasil!</h3>
</section>
<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <span id="closeModal" class="close">&times;</span>

    <img id="modal-img">
    <h2 id="modal-name"></h2>
    <p id="modal-desc"></p>
    <p id="modal-stock"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
